name: Mobile APK Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24   # ✅ use Node 24 (safe, supported)

      - name: Install dependencies
        run: npm install

      - name: Setup Expo CLI
        run: npm install -g expo-cli

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 👇 Add Android SDK setup
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Generate Android project (Expo prebuild)
        run: npx expo prebuild --platform android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/android/app/build/outputs/apk/release/app-release.apk
